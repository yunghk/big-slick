# Hugo configuration
title: AK Bulletin
baseURL: "https://yunghk.github.io/big-slick/"
defaultContentLanguage: en
enableRobotsTXT: true
enableEmoji: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: About
      pageRef: /about
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/yunghk"
      params:
        icon: github
    - name: RSS
      weight: 5
      url: "https://yunghk.github.io/big-slick/index.xml"
      params:
        icon: rss

params:
  blog:
    list:
      sortBy: date
      sortOrder: desc
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: true
    displayPoweredBy: true
  editURL:
    enable: false
