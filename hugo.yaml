# Hugo configuration
title: AK Bulletin
baseURL: "https://yunghk.github.io/big-slick/"
defaultContentLanguage: en
enableRobotsTXT: true
enableEmoji: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Blog
      pageRef: /blog
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/yunghk"
      params:
        icon: github
    - name: RSS
      weight: 5
      url: "https://yunghk.github.io/big-slick/index.xml"
      params:
        icon: rss

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  # "Edit this page" links, off for a personal blog.
  # To turn on, set enable: true and point base at your repo's /content.
  editURL:
    enable: false
